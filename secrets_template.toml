# ─────────────────────────────────────────────────────────────────
# Streamlit Secrets Template
# ─────────────────────────────────────────────────────────────────
# DO NOT commit this file to GitHub.
#
# For LOCAL development:
#   Copy this file to .streamlit/secrets.toml and fill in your values.
#
# For STREAMLIT CLOUD:
#   Go to your app → Settings → Secrets → paste the content below
#   (with your real values filled in).
# ─────────────────────────────────────────────────────────────────

[supabase]
# Get this from: Supabase Dashboard → Settings → Database → Connection string
# Use the POOLER connection string (port 6543) for Streamlit Cloud —
# it reuses connections and is much faster than the direct connection (port 5432).
#
# Format:
# db_url = "postgresql://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres"
#
db_url = "postgresql://postgres.YOURPROJECT:YOURPASSWORD@aws-0-YOURREGION.pooler.supabase.com:6543/postgres"
